# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"
tasks:
  default:
    cmds:
      - task: run

  run:
    desc: "run"
    interactive: true
    cmds:
      - cargo run -- {{.CLI_ARGS}}

  build:
    desc: "build in debug mode"
    cmds:
      - cargo build --all-targets {{.CLI_ARGS}}

  build:release:
    desc: "build in release mode"
    cmds:
      - cargo build --all-targets --release {{.CLI_ARGS}}

  build:goreleaser:
    desc: "build in release mode using goreleaser"
    cmds:
      # pretter-ignore
      - >-
        docker run --rm
        -e "HOST_UID=$(id -u)"
        -e "HOST_GID=$(id -g)"
        -v "${PWD}:/workspace"
        -w /workspace
        ghcr.io/rust-cross/cargo-zigbuild
        bash -c 'set -euo pipefail;
        fix_perms() { for d in target target-goreleaser goreleaser-dist; do [ -e "$d" ] && chown -R "${HOST_UID}:${HOST_GID}" "$d" || true; done; };
        trap fix_perms EXIT;
        ./release.sh && goreleaser build --snapshot --clean'

  release:
    desc: "release using goreleaser"
    cmds:
      # pretter-ignore
      - >-
        docker run --rm
        -e "GITHUB_TOKEN=${GITHUB_TOKEN}"
        -e "TAP_GITHUB_TOKEN=${TAP_GITHUB_TOKEN}"
        -e "HOST_UID=$(id -u)"
        -e "HOST_GID=$(id -g)"
        -v "${PWD}:/workspace"
        -w /workspace
        ghcr.io/rust-cross/cargo-zigbuild
        bash -c 'set -euo pipefail;
        fix_perms() { for d in target target-goreleaser goreleaser-dist; do [ -e "$d" ] && chown -R "${HOST_UID}:${HOST_GID}" "$d" || true; done; };
        trap fix_perms EXIT;
        ./release.sh && goreleaser release --clean'

  typos:
    desc: "check repository for typos"
    aliases: [spellcheck]
    cmds:
      - typos

  check:
    desc: "check cargo workspace"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - cargo check --workspace --all-targets {{.CLI_ARGS}}

  check:fc:
    desc: "check cargo workspace for all combinations of features"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - cargo fc check --workspace --all-targets {{.CLI_ARGS}}

  clean:
    desc: "clean cargo workspace"
    cmds:
      - cargo clean {{.CLI_ARGS}}

  clean:build:
    desc: "remove zigbuild/cc probe garbage object files"
    cmds:
      # prettier-ignore
      - >-
        find .
        -type f
        \( -name '.intentionally-empty-file.o' -o -name '*detect_compiler_family.o' \)
        -delete

  docs:
    desc: "open documentation preview"
    env:
      RUSTDOCFLAGS: "--cfg docsrs"
    cmds:
      - cargo +nightly watchdoc --all-features {{.CLI_ARGS}}

  outdated:
    desc: "check for outdated cargo workspace dependencies"
    cmds:
      - cargo outdated --workspace --ignore-external-rel --exit-code 1 -v {{.CLI_ARGS}}

  unused:
    desc: "check for unused cargo workspace dependencies"
    aliases: [unused-dependencies]
    cmds:
      - cargo +nightly udeps {{.CLI_ARGS}}

  audit:
    desc: "audit cargo workspace dependencies"
    cmds:
      - cargo audit {{.CLI_ARGS}}

  format:
    desc: "format cargo workspace"
    cmds:
      - cargo fmt --all {{.CLI_ARGS}}

  test:
    desc: "test cargo workspace"
    cmds:
      - cargo nextest run --workspace --all-targets {{.CLI_ARGS}}

  test:fc:
    desc: "test cargo workspace for all combinations of features"
    cmds:
      - cargo fc test --all-targets {{.CLI_ARGS}}

  lint:
    desc: "lint cargo workspace"
    cmds:
      - cargo lint {{.CLI_ARGS}}

  lint:fc:
    desc: "lint cargo workspace for all combinations of features"
    cmds:
      - cargo fc lint {{.CLI_ARGS}}

  lint:fix:
    desc: "lint and fix cargo workspace"
    aliases: [fix]
    cmds:
      - cargo fixit {{.CLI_ARGS}}

  lint:actions:
    desc: "lint github actions"
    cmds:
      - actionlint
